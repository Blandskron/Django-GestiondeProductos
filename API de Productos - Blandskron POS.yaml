openapi: 3.0.3
info:
  title: API de Productos - Blandskron POS
  version: 1.0.0
  description: Módulo de inventario para tienda online y punto de venta
paths:
  /api/v1/categorias/:
    get:
      operationId: v1_categorias_list
      tags:
      - Categorías
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoria'
          description: ''
    post:
      operationId: v1_categorias_create
      tags:
      - Categorías
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Categoria'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Categoria'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Categoria'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
          description: ''
  /api/v1/categorias/{id}/:
    get:
      operationId: v1_categorias_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Categoría.
        required: true
      tags:
      - Categorías
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
          description: ''
    put:
      operationId: v1_categorias_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Categoría.
        required: true
      tags:
      - Categorías
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Categoria'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Categoria'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Categoria'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
          description: ''
    patch:
      operationId: v1_categorias_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Categoría.
        required: true
      tags:
      - Categorías
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCategoria'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCategoria'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCategoria'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
          description: ''
    delete:
      operationId: v1_categorias_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Categoría.
        required: true
      tags:
      - Categorías
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/productos/:
    get:
      operationId: v1_productos_list
      description: Obtener lista de todos los productos.
      tags:
      - Productos
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producto'
          description: ''
    post:
      operationId: v1_productos_create
      description: Crear un nuevo producto con imagen.
      tags:
      - Productos
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                slug:
                  type: string
                descripcion:
                  type: string
                categoria:
                  type: integer
                  description: ID de la categoría
                imagen:
                  type: string
                  format: binary
                precio:
                  type: number
                  format: float
                cantidad_disponible:
                  type: integer
                activo:
                  type: boolean
              required:
              - nombre
              - slug
              - categoria
              - precio
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
          description: ''
  /api/v1/productos/{id}/:
    get:
      operationId: v1_productos_retrieve
      description: Obtener detalles de un producto específico.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Producto.
        required: true
      tags:
      - Productos
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
          description: ''
    put:
      operationId: v1_productos_update
      description: Actualizar un producto (incluyendo la imagen).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Producto.
        required: true
      tags:
      - Productos
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                imagen:
                  type: string
                  format: binary
                nombre:
                  type: string
                precio:
                  type: number
                  format: float
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
          description: ''
    patch:
      operationId: v1_productos_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Producto.
        required: true
      tags:
      - Productos
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProducto'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProducto'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
          description: ''
    delete:
      operationId: v1_productos_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Producto.
        required: true
      tags:
      - Productos
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
components:
  schemas:
    Categoria:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - nombre
      - slug
    PatchedCategoria:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
    PatchedProducto:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        descripcion:
          type: string
          title: Descripción
        categoria:
          type: integer
        categoria_nombre:
          type: string
          readOnly: true
        imagen:
          type: string
          format: uri
          nullable: true
        precio:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        cantidad_disponible:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Stock
        valor_total:
          type: string
          readOnly: true
        activo:
          type: boolean
    Producto:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        descripcion:
          type: string
          title: Descripción
        categoria:
          type: integer
        categoria_nombre:
          type: string
          readOnly: true
        imagen:
          type: string
          format: uri
          nullable: true
        precio:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        cantidad_disponible:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Stock
        valor_total:
          type: string
          readOnly: true
        activo:
          type: boolean
      required:
      - categoria
      - categoria_nombre
      - descripcion
      - id
      - nombre
      - precio
      - slug
      - valor_total
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
